<title>Technician Pool 2026–2030</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #eef1f2;
    --surface: #ffffff;
    --surface-2: #f4f6f7;
    --border: #d7dee2;
    --text: #1a2127;
    --text-dim: #5c6b76;
    --accent: #c66a12;
    --accent-strong: #a85809;
    --accent-ink: #fffaf2;
    --good: #2f8f52;
    --good-bg: rgba(47,143,82,0.10);
    --bad: #c94444;
    --bad-bg: rgba(201,68,68,0.10);
    --star: #b8860b;
    --radius: 10px;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", "Liberation Mono", monospace;
    --sans: -apple-system, "Segoe UI", "Inter", system-ui, "Helvetica Neue", Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #12161a;
      --surface: #1a2027;
      --surface-2: #20272f;
      --border: #2b343e;
      --text: #e7ecef;
      --text-dim: #93a1ac;
      --accent: #ff9e2c;
      --accent-strong: #ffb454;
      --accent-ink: #1a1206;
      --good: #52c17e;
      --good-bg: rgba(82,193,126,0.13);
      --bad: #ea6d6b;
      --bad-bg: rgba(234,109,107,0.13);
      --star: #f0c14b;
    }
  }
  :root[data-theme="dark"] {
    --bg: #12161a; --surface: #1a2027; --surface-2: #20272f; --border: #2b343e;
    --text: #e7ecef; --text-dim: #93a1ac; --accent: #ff9e2c; --accent-strong: #ffb454;
    --accent-ink: #1a1206; --good: #52c17e; --good-bg: rgba(82,193,126,0.13);
    --bad: #ea6d6b; --bad-bg: rgba(234,109,107,0.13); --star: #f0c14b;
  }
  :root[data-theme="light"] {
    --bg: #eef1f2; --surface: #ffffff; --surface-2: #f4f6f7; --border: #d7dee2;
    --text: #1a2127; --text-dim: #5c6b76; --accent: #c66a12; --accent-strong: #a85809;
    --accent-ink: #fffaf2; --good: #2f8f52; --good-bg: rgba(47,143,82,0.10);
    --bad: #c94444; --bad-bg: rgba(201,68,68,0.10); --star: #b8860b;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body, html { overflow-x: hidden; }

  .app { max-width: 860px; margin: 0 auto; padding: 20px 18px 80px; }

  header.top {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
    margin-bottom: 16px; flex-wrap: wrap;
  }
  header.top .brand { display: flex; flex-direction: column; gap: 2px; }
  header.top .brand .callsign {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.14em;
    color: var(--accent); text-transform: uppercase; font-weight: 600;
  }
  header.top h1 { font-size: 21px; margin: 0; font-weight: 700; letter-spacing: -0.01em; }
  header.top .sub { font-size: 12.5px; color: var(--text-dim); }

  nav.tabs {
    display: flex; gap: 4px; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 4px; margin-bottom: 20px; overflow-x: auto;
  }
  nav.tabs button {
    font-family: var(--sans); font-size: 13.5px; font-weight: 600; color: var(--text-dim);
    background: transparent; border: none; border-radius: 7px; padding: 8px 14px;
    cursor: pointer; white-space: nowrap; transition: background 0.15s, color 0.15s;
  }
  nav.tabs button:hover { color: var(--text); }
  nav.tabs button.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  nav.tabs button:focus-visible, button:focus-visible, a:focus-visible, select:focus-visible, input:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ---------- meter / stats ---------- */
  .meter-row { display: flex; align-items: center; gap: 10px; }
  .meter-track {
    flex: 1; height: 8px; border-radius: 5px; background: var(--surface-2);
    border: 1px solid var(--border); overflow: hidden;
  }
  .meter-fill { height: 100%; background: linear-gradient(90deg, var(--accent-strong), var(--accent)); border-radius: 5px 0 0 5px; }
  .meter-label { font-family: var(--mono); font-size: 12px; color: var(--text-dim); min-width: 62px; text-align: right; font-variant-numeric: tabular-nums; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 10px; margin-bottom: 22px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-card .n { font-family: var(--mono); font-size: 26px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stat-card .l { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

  /* ---------- learn / accordion ---------- */
  .subel {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 10px; overflow: hidden;
  }
  .subel-head {
    display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer;
    user-select: none;
  }
  .subel-head .code { font-family: var(--mono); color: var(--accent); font-weight: 700; font-size: 13.5px; min-width: 26px; }
  .subel-head .title { font-weight: 600; font-size: 14.5px; flex: 1; }
  .subel-head .count { font-family: var(--mono); font-size: 11.5px; color: var(--text-dim); }
  .subel-head .chev { color: var(--text-dim); transition: transform 0.15s; font-size: 11px; }
  .subel.open .chev { transform: rotate(90deg); }
  .subel-body { display: none; border-top: 1px solid var(--border); }
  .subel.open .subel-body { display: block; }

  .group { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .group:last-child { border-bottom: none; }
  .group-title { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
  .group-title b { font-family: var(--mono); color: var(--text); }

  .qcard {
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; margin-bottom: 8px;
  }
  .qcard:last-child { margin-bottom: 0; }
  .qhead { display: flex; justify-content: space-between; gap: 8px; align-items: baseline; margin-bottom: 6px; }
  .qcode { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .star-btn { background: none; border: none; cursor: pointer; font-size: 15px; color: var(--border); line-height: 1; padding: 0; }
  .star-btn.on { color: var(--star); }
  .qtext { font-size: 14.5px; margin-bottom: 8px; text-wrap: balance; }
  .fig { max-width: 100%; height: auto; display: block; margin: 6px 0 10px; background: #fff; border-radius: 6px; padding: 6px; border: 1px solid var(--border); }
  .opts { display: flex; flex-direction: column; gap: 5px; }
  .opt { display: flex; gap: 8px; font-size: 13.5px; padding: 6px 8px; border-radius: 6px; }
  .opt .letter { font-family: var(--mono); color: var(--text-dim); font-weight: 600; }
  .opt.correct { background: var(--good-bg); color: var(--good); }
  .opt.correct .letter { color: var(--good); }
  .reveal-btn {
    margin-top: 8px; font-size: 12px; font-weight: 600; color: var(--accent); background: none;
    border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; cursor: pointer;
  }
  .reveal-btn:hover { border-color: var(--accent); }
  .ref { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 6px; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  select, .btn {
    font-family: var(--sans); font-size: 13px; padding: 8px 12px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer;
  }
  .btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 700; }
  .btn.primary:hover { background: var(--accent-strong); }
  .btn:hover { border-color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ---------- flashcards ---------- */
  .deck-info { font-size: 12.5px; color: var(--text-dim); margin-bottom: 10px; font-family: var(--mono); }
  .flash-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .flashcard {
    width: 100%; min-height: 260px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 26px 24px; display: flex; flex-direction: column;
    justify-content: center; gap: 14px; cursor: pointer; position: relative;
  }
  .flashcard .fc-code { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.08em; }
  .flashcard .fc-q { font-size: 17px; font-weight: 600; text-wrap: balance; }
  .flashcard .fc-hint { position: absolute; bottom: 12px; right: 16px; font-size: 11px; color: var(--text-dim); }
  .fc-answer { display: none; flex-direction: column; gap: 5px; margin-top: 4px; }
  .flashcard.flipped .fc-answer { display: flex; }
  .flashcard.flipped .fc-q { color: var(--text-dim); font-size: 14px; }
  .fc-answer .letter-big { font-family: var(--mono); color: var(--good); font-weight: 700; }
  .fc-nav { display: flex; gap: 10px; align-items: center; }
  .fc-counter { font-family: var(--mono); font-size: 12.5px; color: var(--text-dim); min-width: 70px; text-align: center; font-variant-numeric: tabular-nums; }

  /* ---------- quiz ---------- */
  .quiz-setup { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .quiz-setup h2 { font-size: 15px; margin: 0; }
  .quiz-setup .desc { font-size: 12.5px; color: var(--text-dim); }
  .quiz-progress { display: flex; gap: 3px; margin-bottom: 16px; }
  .quiz-progress .tick { flex: 1; height: 5px; border-radius: 3px; background: var(--surface-2); border: 1px solid var(--border); }
  .quiz-progress .tick.done.correct { background: var(--good); border-color: var(--good); }
  .quiz-progress .tick.done.wrong { background: var(--bad); border-color: var(--bad); }
  .quiz-progress .tick.current { background: var(--accent); border-color: var(--accent); }
  .quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .quiz-card .qcode { margin-bottom: 6px; }
  .quiz-card .qtext { font-size: 16px; margin-bottom: 14px; }
  .quiz-opt {
    display: flex; gap: 10px; align-items: flex-start; padding: 11px 12px; border-radius: 8px;
    border: 1px solid var(--border); margin-bottom: 7px; cursor: pointer; font-size: 14px;
    background: var(--surface-2); transition: border-color 0.1s;
  }
  .quiz-opt:hover { border-color: var(--accent); }
  .quiz-opt .letter { font-family: var(--mono); font-weight: 700; color: var(--text-dim); }
  .quiz-opt.chosen-correct { background: var(--good-bg); border-color: var(--good); }
  .quiz-opt.chosen-correct .letter { color: var(--good); }
  .quiz-opt.chosen-wrong { background: var(--bad-bg); border-color: var(--bad); }
  .quiz-opt.chosen-wrong .letter { color: var(--bad); }
  .quiz-opt.disabled { cursor: default; }
  .quiz-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .quiz-fb { font-size: 12.5px; font-weight: 600; }
  .quiz-fb.correct { color: var(--good); }
  .quiz-fb.wrong { color: var(--bad); }

  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 26px; text-align: center; }
  .result-card .score { font-family: var(--mono); font-size: 44px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .result-card .verdict { font-size: 14px; color: var(--text-dim); margin-top: 4px; margin-bottom: 18px; }
  .miss-list { text-align: left; margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }

  /* ---------- missed / empty ---------- */
  .empty { text-align: center; padding: 50px 20px; color: var(--text-dim); font-size: 13.5px; }

  @media (max-width: 520px) {
    .flashcard { min-height: 220px; padding: 20px 18px; }
    .result-card .score { font-size: 36px; }
  }
</style>

<div class="app">
  <header class="top">
    <div class="brand">
      <div class="callsign">FCC Element 2 &middot; Amateur Radio</div>
      <h1>Technician Pool 2026&ndash;2030</h1>
      <div class="sub">409 official questions &middot; effective 7/1/2026&ndash;6/30/2030</div>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-tab="learn" class="active">Learn</button>
    <button data-tab="flash">Flashcards</button>
    <button data-tab="quiz">Quiz</button>
    <button data-tab="missed">Missed</button>
    <button data-tab="stats">Progress</button>
  </nav>

  <section class="panel active" id="panel-learn">
    <div id="learnList"></div>
  </section>

  <section class="panel" id="panel-flash">
    <div class="filter-row">
      <select id="flashScope"></select>
      <button class="btn" id="flashShuffle">Shuffle</button>
    </div>
    <div class="deck-info" id="flashDeckInfo"></div>
    <div class="flash-wrap">
      <div class="flashcard" id="flashcard">
        <div class="fc-code" id="fcCode"></div>
        <div class="fc-q" id="fcQ"></div>
        <div class="fc-answer" id="fcAnswer"></div>
        <div class="fc-hint">tap card to flip</div>
      </div>
      <div class="fc-nav">
        <button class="btn" id="fcPrev">&larr; Prev</button>
        <div class="fc-counter" id="fcCounter"></div>
        <button class="btn" id="fcNext">Next &rarr;</button>
      </div>
    </div>
  </section>

  <section class="panel" id="panel-quiz">
    <div id="quizArea"></div>
  </section>

  <section class="panel" id="panel-missed">
    <div id="missedArea"></div>
  </section>

  <section class="panel" id="panel-stats">
    <div id="statsArea"></div>
  </section>
</div>

<script>
const POOL_DATA = {"questions": [{"code": "T1A01", "answer": "C", "ref": "97.1", "question": "Which of the following is part of the Basis and Purpose of the Amateur Radio Service?", "options": {"A": "Providing personal radio communications for as many citizens as possible", "B": "Providing communications for international contesting", "C": "Advancing skills in the technical and communication phases of the radio art", "D": "All these choices are correct"}}, {"code": "T1A02", "answer": "C", "ref": "97.1", "question": "Which agency regulates and enforces the rules for the Amateur Radio Service in the United States?", "options": {"A": "ARRL", "B": "Homeland Security", "C": "The FCC", "D": "All these choices are correct"}}, {"code": "T1A03", "answer": "B", "ref": "97.119(b)(2)", "question": "What do the FCC rules state regarding the use of a phonetic alphabet for station identification in the Amateur Radio Service?", "options": {"A": "It is required when transmitting emergency messages", "B": "It is encouraged when using phone emissions", "C": "It is required when in contact with foreign stations", "D": "All these choices are correct"}}, {"code": "T1A04", "answer": "A", "ref": "97.23", "question": "How do you receive official notification of your new license and call sign after passing the exam?", "options": {"A": "Email from the FCC with a link to download the license grant", "B": "USPS First-Class Mail from the FCC", "C": "Email from the lead volunteer examiner", "D": "USPS First-Class Mail from the lead volunteer examiner"}}, {"code": "T1A05", "answer": "C", "ref": "97.7", "question": "What proves that the FCC has issued an operator/primary license grant?", "options": {"A": "A printed copy of the certificate of successful completion of examination", "B": "An email notification from the NCVEC granting the license", "C": "The license appears in the FCC ULS database", "D": "All these choices are correct"}}, {"code": "T1A06", "answer": "D", "ref": "97.203(d)", "question": "On which of the following HF frequencies can automatically controlled amateur propagation beacons be found?", "options": {"A": "Anywhere in the Technician portion of 10 meters", "B": "Anywhere, if they are registered with the FCC", "C": "In a specific portion of each of the HF Technician bands", "D": "On ten meters, between 28.200 MHz and 28.300 MHz"}}, {"code": "T1A07", "answer": "C", "ref": "97.3(a)(41)", "question": "What is the FCC Part 97 definition of a space station?", "options": {"A": "Any satellite orbiting Earth", "B": "A manned satellite orbiting Earth", "C": "An amateur station located more than 50 km above Earth's surface", "D": "An amateur station using amateur radio satellites for relay of signals"}}, {"code": "T1A08", "answer": "B", "ref": "97.3(a)(22)", "question": "Who recommends transmit/receive channels for repeater and auxiliary stations?", "options": {"A": "A Frequency Spectrum Manager appointed by the FCC", "B": "A Volunteer Frequency Coordinator recognized by local amateurs", "C": "An FCC Regional Field Office", "D": "The International Telecommunication Union"}}, {"code": "T1A09", "answer": "C", "ref": "97.3(a)(22)", "question": "Who selects a Frequency Coordinator?", "options": {"A": "The FCC Office of Spectrum Management and Coordination Policy", "B": "The local chapter of the Office of National Council of Independent Frequency Coordinators", "C": "Amateur operators in a local or regional area whose stations are eligible to be repeater or auxiliary stations", "D": "The FCC Regional Field Office"}}, {"code": "T1A10", "answer": "C", "ref": "97.407(a)", "question": "Besides an FCC-issued amateur operator license, what is required to be the control operator of a Radio Amateur Civil Emergency Service (RACES) Station?", "options": {"A": "A written recommendation by the local ARRL Emergency Coordinator", "B": "Membership in the Amateur Radio Emergency Service (ARES)", "C": "Certification of current enrollment by a civil defense organization", "D": "Nothing"}}, {"code": "T1A11", "answer": "B", "ref": "97.101(d)", "question": "Which of the following is prohibited?", "options": {"A": "International communications on VHF bands and higher frequencies", "B": "Willful or malicious interference", "C": "Third-party traffic using digital modes", "D": "All these choices are correct T1B Frequency allocations; Emission modes; Spectrum sharing; Transmissions near band edges; Contacting the International Space Station; Power output"}}, {"code": "T1B01", "answer": "C", "ref": "97.301(e)", "question": "Which of the following frequency ranges are available for phone operation by Technician licensees?", "options": {"A": "28.050 MHz to 28.150 MHz", "B": "28.100 MHz to 28.300 MHz", "C": "28.300 MHz to 28.500 MHz", "D": "28.500 MHz to 28.600 MHz"}}, {"code": "T1B02", "answer": "B", "ref": "97.301, 97.207(c)", "question": "Which of the following U.S. amateur radio operators are allowed to contact the International Space Station (ISS) on VHF bands?", "options": {"A": "Only amateurs with a General class or higher license", "B": "Any amateur with a Technician class or higher license", "C": "Only amateurs with a General class or higher license, and NASA approval", "D": "Any amateurs with a Technician class or higher license, and NASA approval"}}, {"code": "T1B03", "answer": "B", "ref": "97.301(a)", "question": "Which frequency is in the 6-meter amateur band?", "options": {"A": "49.00 MHz", "B": "52.525 MHz", "C": "28.50 MHz", "D": "222.15 MHz"}}, {"code": "T1B04", "answer": "D", "ref": "97.301(a)", "question": "Which amateur band includes 146.52 MHz?", "options": {"A": "6 meters", "B": "20 meters", "C": "70 centimeters", "D": "2 meters"}}, {"code": "T1B05", "answer": "D", "ref": "97.301, 97.305", "question": "Which of the following bands include frequencies where Technicians are authorized to use digital modes such as FT8?", "options": {"A": "10 meters", "B": "6 meters", "C": "2 meters", "D": "All these choices are correct"}}, {"code": "T1B06", "answer": "B", "ref": "97.301(e), 97.305", "question": "On which HF bands does a Technician class operator have phone privileges?", "options": {"A": "None", "B": "10-meter band only", "C": "80-meter, 40-meter, 15-meter, and 10-meter bands", "D": "30-meter band only"}}, {"code": "T1B07", "answer": "A", "ref": "97.305(a), (c)", "question": "Which of the following VHF/UHF band segments are limited to CW only?", "options": {"A": "50.0 MHz to 50.1 MHz and 144.0 MHz to 144.1 MHz", "B": "219 MHz to 220 MHz and 420.0 MHz to 420.1 MHz", "C": "902.0 MHz to 902.1 MHz", "D": "All these choices are correct"}}, {"code": "T1B08", "answer": "A", "ref": "97.303", "question": "How are US amateurs restricted in segments of bands where the Amateur Radio Service is secondary?", "options": {"A": "U.S. amateurs may find non-amateur stations in those segments, and must avoid interfering with them", "B": "U.S. amateurs must give foreign amateur stations priority in those segments", "C": "International communications are not permitted in those segments", "D": "Digital transmissions are not permitted in those segments"}}, {"code": "T1B09", "answer": "D", "ref": "97.101(a), 97.301(a-e)", "question": "Why should you not set your transmit frequency to be exactly at the edge of an amateur band or sub-band?", "options": {"A": "To allow for calibration error in the transmitter frequency display", "B": "So that modulation sidebands do not extend beyond the band edge", "C": "To allow for transmitter frequency drift", "D": "All these choices are correct"}}, {"code": "T1B10", "answer": "C", "ref": "97.305(c)", "question": "Where may SSB phone be used in amateur bands above 50 MHz?", "options": {"A": "Only in sub-bands allocated to General class or higher licensees", "B": "Only on repeaters", "C": "In at least some segment of all these bands", "D": "On any band if the power is limited to 25 watts"}}, {"code": "T1B11", "answer": "A", "ref": "97.313", "question": "What is the maximum peak envelope power output for Technician class operators in their HF band segments?", "options": {"A": "200 watts", "B": "100 watts", "C": "50 watts", "D": "10 watts"}}, {"code": "T1B12", "answer": "D", "ref": "97.313(b)", "question": "Except for some specific restrictions, what is the maximum peak envelope power output for Technician class operators using frequencies above 30 MHz?", "options": {"A": "50 watts", "B": "100 watts", "C": "500 watts", "D": "1500 watts T1C Licensing: classes, sequential and vanity call sign systems, places where the Amateur Radio Service is regulated by the FCC, name and address on FCC license database, term, renewal, grace period, maintaining mailing address; International communications"}}, {"code": "T1C01", "answer": "D", "ref": "97.9(a), 97.17(a)", "question": "Which amateur license classes are currently issued by the FCC?", "options": {"A": "Novice, Technician, General, Amateur Extra", "B": "Technician, Technician Plus, General, Amateur Extra", "C": "Novice, Technician Plus, General, Advanced", "D": "Technician, General, Amateur Extra"}}, {"code": "T1C02", "answer": "D", "ref": "97.19", "question": "Who may select a desired call sign under the vanity call sign rules?", "options": {"A": "Only a licensed amateur with a General or Amateur Extra Class license", "B": "Only a licensed amateur with an Amateur Extra Class license", "C": "Only a licensed amateur who has been licensed continuously for more than 10 years", "D": "Any licensed amateur"}}, {"code": "T1C03", "answer": "A", "ref": "97.117", "question": "What types of international communications are FCC-licensed amateur radio stations permitted to make?", "options": {"A": "Communications incidental to the purposes of the Amateur Radio Service and remarks of a personal character", "B": "Communications incidental to conducting business or remarks of a personal nature", "C": "Only communications incidental to contest exchanges; all other communications are prohibited", "D": "Any communications that would be permitted by an international broadcast station"}}, {"code": "T1C04", "answer": "B", "ref": "97.23", "question": "What may happen if the FCC is unable to reach you by email?", "options": {"A": "Fine and suspension of operator license", "B": "Revocation of the station license or suspension of the operator license", "C": "Revocation of access to the license record in the FCC system", "D": "Nothing; there is no such requirement"}}, {"code": "T1C05", "answer": "A", "ref": "", "question": "Which of the following is a valid Group D call sign format for Technician class?", "options": {"A": "KF1XXX", "B": "KA1X", "C": "W1XX", "D": "All these choices are correct"}}, {"code": "T1C06", "answer": "D", "ref": "97.5(a)(2), 97.11(a)", "question": "Which of the following statements is true about using your amateur radio license when operating aboard a vessel or craft in international waters?", "options": {"A": "Amateur operation is prohibited in international waters", "B": "You may only operate during maritime emergencies", "C": "You need special FCC authorization for maritime mobile operation", "D": "You may operate from a US-documented vessel with the master's permission"}}, {"code": "T1C07", "answer": "B", "ref": "97.21, 1.949", "question": "How long before the expiration date may an amateur radio license renewal be requested?", "options": {"A": "30 days", "B": "90 days", "C": "6 months", "D": "1 year"}}, {"code": "T1C08", "answer": "C", "ref": "97.25", "question": "What is the normal term for an FCC-issued amateur radio license?", "options": {"A": "Five years", "B": "Eight years", "C": "Ten years", "D": "Life"}}, {"code": "T1C09", "answer": "A", "ref": "97.21(a)(b)", "question": "What is the grace period for renewal if an amateur license expires?", "options": {"A": "Two years", "B": "Three years", "C": "Five years", "D": "Ten years"}}, {"code": "T1C10", "answer": "C", "ref": "97.5a", "question": "How soon after passing the examination for your first amateur radio license may you transmit on the amateur radio bands?", "options": {"A": "Immediately on receiving your Certificate of Successful Completion of Examination (CSCE)", "B": "As soon as your operator/station license grant appears on the ARRL website", "C": "As soon as your operator/station license grant appears in the FCC\u2019s license database", "D": "As soon as you receive your license in the mail from the FCC"}}, {"code": "T1C11", "answer": "D", "ref": "97.21(b)", "question": "If your license has expired and is still within the allowable grace period, may you continue to transmit on the amateur radio bands?", "options": {"A": "Yes, for up to two years", "B": "Yes, as soon as you apply for renewal", "C": "Yes, for up to one year", "D": "No, you must wait until the license has been renewed T1D Authorized and prohibited transmissions; Sale of equipment"}}, {"code": "T1D01", "answer": "A", "ref": "97.111(a)(1)", "question": "With which countries are FCC-licensed amateur radio stations prohibited from exchanging communications?", "options": {"A": "Any country whose administration has notified the International Telecommunication Union (ITU) that it objects to such communications", "B": "Any country whose administration has notified the American Radio Relay League (ARRL) that it objects to such communications", "C": "Any country banned from such communications by the International Amateur Radio Union (IARU)", "D": "Any country banned from making such communications by the American Radio Relay League (ARRL)"}}, {"code": "T1D02", "answer": "B", "ref": "97.113(b), 97.111(b)", "question": "Under which of the following circumstances are one-way transmissions by an amateur station prohibited?", "options": {"A": "Announcements of upcoming ham radio operating events", "B": "Broadcasting", "C": "International Morse Code Practice", "D": "Telecommand or transmissions of telemetry"}}, {"code": "T1D03", "answer": "C", "ref": "97.211(b), 97.215(b), 97.113(a)(4)", "question": "When is it permissible to transmit messages encoded to obscure their meaning?", "options": {"A": "Only when using a remote station during a contest", "B": "Only when transmitting certain approved digital codes", "C": "Only when transmitting control commands to space stations or model craft", "D": "Never"}}, {"code": "T1D04", "answer": "A", "ref": "97.113(a)(4), 97.113(c)", "question": "Under what conditions is an amateur station authorized to transmit music using a phone emission?", "options": {"A": "When incidental to an authorized retransmission of manned spacecraft communications", "B": "When the music produces no spurious emissions", "C": "When transmissions are limited to less than three minutes per hour", "D": "When the music is transmitted above 1280 MHz"}}, {"code": "T1D05", "answer": "D", "ref": "97.113(a)(3)(ii)", "question": "When may amateur radio operators use their stations to notify other amateurs of the availability of equipment for sale or trade?", "options": {"A": "Never", "B": "When the equipment is not the personal property of either the station licensee, or the control operator, or their close relatives", "C": "When no profit is made on the sale", "D": "When selling amateur radio equipment and not on a regular basis"}}, {"code": "T1D06", "answer": "B", "ref": "97.113(a)(4)", "question": "What, if any, are the restrictions concerning transmission of language that may be considered indecent or obscene?", "options": {"A": "The FCC maintains a list of words that are not permitted to be used on amateur frequencies", "B": "Any such language is prohibited", "C": "The International Telecommunications Union (ITU) maintains a list of words that are not permitted to be used on amateur frequencies", "D": "There is no such prohibition"}}, {"code": "T1D07", "answer": "A", "ref": "97.113(d), 97.201(e)", "question": "Which of the following is an example of an auxiliary station?", "options": {"A": "A station sending one-way transmissions between a remote repeater receiver and the main repeater transmitter", "B": "A backup radio for emergency use in case the main station radio fails", "C": "A station used in the Military Auxiliary Radio System for linking government and amateur stations in a digital network", "D": "A second station utilized in multi-operator contest stations"}}, {"code": "T1D08", "answer": "B", "ref": "97.113(a)(3)(iii)", "question": "In which of the following circumstances may the control operator of an amateur station receive compensation for operating that station?", "options": {"A": "When the communication is related to the sale of amateur equipment by the control operator's employer", "B": "When the communication is a part of classroom instruction at an educational institution", "C": "When the communication is made to obtain emergency information for a local broadcast station", "D": "All these choices are correct"}}, {"code": "T1D09", "answer": "A", "ref": "97.113(5)(b)", "question": "When may amateur stations transmit information in support of broadcasting, program production, or news gathering, assuming no other means is available?", "options": {"A": "When such communications are directly related to the immediate safety of human life or protection of property", "B": "When broadcasting communications to or from the space shuttle", "C": "Where non-commercial programming is gathered and supplied exclusively to the National Public Radio network", "D": "Never"}}, {"code": "T1D10", "answer": "D", "ref": "97.3(a)(10)", "question": "How does the FCC define broadcasting for the Amateur Radio Service?", "options": {"A": "Two-way transmissions by amateur stations", "B": "Any transmission made by the licensed station", "C": "Transmission of messages directed only to amateur operators", "D": "Transmissions intended for reception by the general public"}}, {"code": "T1D11", "answer": "D", "ref": "97.215", "question": "When may an amateur station transmit without identifying on the air?", "options": {"A": "When the transmissions are of a brief nature to make station adjustments", "B": "When the transmissions are unmodulated", "C": "When the transmitted power level is below 0.1 watt", "D": "When transmitting signals to control model craft"}}, {"code": "T1D12", "answer": "A", "ref": "97.119(a)", "question": "Which of the following is required when making on-the-air test transmissions?", "options": {"A": "Identify the transmitting station", "B": "Conduct tests only between 10 p.m. and 6 a.m. local time", "C": "Notify the FCC of the transmissions", "D": "All these choices are correct T1E Control operator: eligibility, designating, privileges, duties, location, required; Control point; Control types: automatic, remote"}}, {"code": "T1E01", "answer": "D", "ref": "97.7(a)", "question": "When may an amateur station transmit without a control operator?", "options": {"A": "When using automatic control, such as in the case of a repeater", "B": "When the station licensee is away and another licensed amateur is using the station", "C": "When the transmitting station is an auxiliary station", "D": "Never"}}, {"code": "T1E02", "answer": "D", "ref": "97.301, 97.207(c)", "question": "Who may be the control operator of a station communicating through an amateur satellite or space station?", "options": {"A": "Only an Amateur Extra Class operator", "B": "A General class or higher licensee with a satellite operator certification", "C": "Only an Amateur Extra Class operator who is also an AMSAT member", "D": "Any amateur allowed to transmit on the satellite uplink frequency"}}, {"code": "T1E03", "answer": "A", "ref": "97.103(b)", "question": "Who must designate the station control operator?", "options": {"A": "The station licensee", "B": "The FCC", "C": "The frequency coordinator", "D": "Any licensed operator"}}, {"code": "T1E04", "answer": "D", "ref": "97.103(b)", "question": "What determines the transmitting frequency privileges of an amateur station?", "options": {"A": "The frequency authorized by the frequency coordinator", "B": "The frequencies printed on the license grant", "C": "The highest class of operator license held by anyone on the premises", "D": "The class of operator license held by the control operator"}}, {"code": "T1E05", "answer": "C", "ref": "97.3(a)(14)", "question": "What is an amateur station\u2019s control point?", "options": {"A": "The location of the station\u2019s transmitting antenna", "B": "The location of the station\u2019s transmitting apparatus", "C": "The location at which the control operator function is performed", "D": "The mailing address of the station licensee"}}, {"code": "T1E06", "answer": "A", "ref": "97.301", "question": "When, other than during an emergency, may a Technician class licensee be the control operator of a station operating in an Amateur Extra Class band segment?", "options": {"A": "At no time", "B": "When designated as the control operator by an Amateur Extra Class licensee", "C": "As part of a multi-operator contest team", "D": "When using a club station whose trustee holds an Amateur Extra Class license"}}, {"code": "T1E07", "answer": "D", "ref": "97.103(a)", "question": "When the control operator is not the station licensee, who is responsible for the proper operation of the station?", "options": {"A": "All licensed amateurs who are present at the operation", "B": "Only the station licensee", "C": "Only the control operator", "D": "The control operator and the station licensee"}}, {"code": "T1E08", "answer": "A", "ref": "97.3(a)(6), 97.205(d)", "question": "Which of the following is an example of automatic control?", "options": {"A": "Repeater operation", "B": "Controlling a station over the internet", "C": "Using a computer or other device to send CW automatically", "D": "Using a computer or other device to identify automatically"}}, {"code": "T1E09", "answer": "D", "ref": "97.109(c)", "question": "Which amateur stations may be remotely controlled?", "options": {"A": "Only repeater stations", "B": "Only automatically controlled stations", "C": "Only digital stations", "D": "Any station"}}, {"code": "T1E10", "answer": "B", "ref": "97.3(a)(39)", "question": "Which of the following is an example of remote control as defined in Part 97?", "options": {"A": "A software defined radio (SDR)", "B": "Operating the station over the internet", "C": "Controlling a model aircraft, boat, or car by amateur radio", "D": "Earth-Moon-Earth (EME) communication"}}, {"code": "T1E11", "answer": "D", "ref": "97.3(a)(13)", "question": "What is a control operator as defined in Part 97?", "options": {"A": "The person speaking or otherwise communicating messages over an amateur station", "B": "The person who is the licensee of an amateur station", "C": "An amateur operator identified in the FCC database as responsible for transmissions and FCC rules compliance at a station license location", "D": "An amateur operator designated by the licensee of a station to be responsible for transmissions and FCC rules compliance at that station T1F Station identification; Repeaters; Third party communications; Club stations; FCC inspection"}}, {"code": "T1F01", "answer": "B", "ref": "97.103(c)", "question": "When must the station licensee make the station and the station records available for inspection?", "options": {"A": "At any time ten days after notification by the FCC of such an inspection", "B": "At any time upon request by an FCC representative", "C": "At any time after a written notification by the FCC of such inspection", "D": "Only when presented with a valid warrant by an FCC official or government agent"}}, {"code": "T1F02", "answer": "C", "ref": "97.119(a)", "question": "How often must you identify with your FCC-assigned call sign when using tactical call signs such as \u201cRace Headquarters\u201d?", "options": {"A": "Never, the tactical call is sufficient", "B": "Once every hour", "C": "At least every 10 minutes during and at the end of a communication", "D": "At the end of every transmission"}}, {"code": "T1F03", "answer": "D", "ref": "97.119(a)", "question": "When are you required to transmit your assigned call sign?", "options": {"A": "At the beginning of each contact, and every 10 minutes thereafter", "B": "At least once during each transmission", "C": "At least every 15 minutes during and at the end of a communication", "D": "At least every 10 minutes during and at the end of a communication"}}, {"code": "T1F04", "answer": "C", "ref": "97.119(b)(2)", "question": "What language must you use for identification when using a phone emission?", "options": {"A": "Any language recognized by the United Nations", "B": "Any language recognized by the ITU", "C": "English", "D": "English, French, or Spanish"}}, {"code": "T1F05", "answer": "B", "ref": "97.119(b)(2)", "question": "What method of call sign identification is required for a station transmitting phone signals?", "options": {"A": "Send the call sign followed by the indicator RPT", "B": "Send the call sign using a CW or phone emission", "C": "Send the call sign followed by the indicator R", "D": "Send the call sign using only a phone emission"}}, {"code": "T1F06", "answer": "D", "ref": "97.119(c)", "question": "Which of the following self-assigned indicators are acceptable when using a phone transmission?", "options": {"A": "KL7CC stroke W3", "B": "KL7CC slant W3", "C": "KL7CC slash W3", "D": "All these choices are correct"}}, {"code": "T1F07", "answer": "B", "ref": "97.115(a)(2)", "question": "Which of the following restrictions apply when a non-licensed person speaks to a foreign amateur radio station via a station under the control of an FCC-licensed amateur radio operator?", "options": {"A": "The person must be a U.S. citizen", "B": "The foreign station must be in a country with which the U.S. has a third-party agreement", "C": "The licensed control operator must do the station identification", "D": "All these choices are correct"}}, {"code": "T1F08", "answer": "A", "ref": "97.3(a)(47)", "question": "What is the definition of third-party communications?", "options": {"A": "A message from a control operator to another amateur station control operator on behalf of another person", "B": "Amateur radio communications where three stations are in communications with one another", "C": "Operation when the transmitting equipment is licensed to a person other than the control operator", "D": "Temporary authorization for an unlicensed person to transmit on the amateur bands for technical experiments"}}, {"code": "T1F09", "answer": "C", "ref": "97.3(a)(40)", "question": "What type of amateur station simultaneously retransmits the signal of another amateur station on a different channel or channels?", "options": {"A": "Beacon station", "B": "Remote control station", "C": "Repeater station", "D": "Message forwarding station"}}, {"code": "T1F10", "answer": "A", "ref": "97.205(g)", "question": "Who is accountable if a repeater inadvertently retransmits communications that violate the FCC rules?", "options": {"A": "The control operator of the originating station", "B": "The control operator of the repeater", "C": "The owner of the repeater", "D": "Both the originating station and the repeater owner"}}, {"code": "T1F11", "answer": "B", "ref": "97.5(b)(2)", "question": "Which of the following is a requirement for the issuance of a club station license grant?", "options": {"A": "The trustee must have an Amateur Extra Class operator license grant", "B": "The club must have at least four members", "C": "The club must be registered with the American Radio Relay League (ARRL)", "D": "All these choices are correct SUBELEMENT T2 - OPERATING PROCEDURES [3 Exam Questions - 3 Groups] T2A Station operation: choosing an operating frequency, calling another station, test transmissions; Band plans: calling frequencies, repeater offsets"}}, {"code": "T2A01", "answer": "B", "ref": "", "question": "What is a common repeater frequency offset in the 2-meter band?", "options": {"A": "Plus or min arrier for approximately 10 seconds, followed by \u201cthis is\u201d and your call sign, and pause to listen; repeat as necessary", "D": "Repeat \u201cCQ\u201d a few times, followed by \u201cthis is,\u201d and your call sign, then pause to listen; repeat as necessary"}}, {"code": "T2A07", "answer": "A", "ref": "", "question": "What does the term \"repeater offset\" mean?", "options": {"A": "The difference between a repeater\u2019s transmit and receive frequencies", "B": "The repeater has a time delay to prevent interference", "C": "The approximately half-second delay to allow for the \u201csquelch tail\u201d to be removed", "D": "The fee charged by the repeater owner or club to provide for maintenance"}}, {"code": "T2A08", "answer": "D", "ref": "", "question": "What is the meaning of the procedural signal \u201cCQ\u201d?", "options": {"A": "A shortened form of the term \u201cContest QSO\u201d", "B": "\u201cCommunication Quality,\u201d used to indicate transmitted audio clarity", "C": "Only the called station should transmit", "D": "Calling any station"}}, {"code": "T2A09", "answer": "B", "ref": "", "question": "Which of the following is a customary way to indicate a station is listening on a repeater and looking for a contact?", "options": {"A": "\u201cCQ CQ\u201d followed by the repeater\u2019s call sign", "B": "The station\u2019s call sign followed by the word \u201clistening\u201d", "C": "The repeater\u2019s call sign followed by the station\u2019s call sign", "D": "\u201cQSY\u201d followed by your call sign"}}, {"code": "T2A10", "answer": "A", "ref": "", "question": "What is a band plan, beyond the privileges established by the FCC?", "options": {"A": "A voluntary guideline for using different modes or activities within an amateur band", "B": "A list of operating schedules", "C": "A list of available net frequencies", "D": "A plan devised by a club to indicate frequency band usage"}}, {"code": "T2A11", "answer": "C", "ref": "", "question": "What term describes a ice"}}, {"code": "T0A06", "answer": "D", "ref": "", "question": "What is a good way to guard against electrical shock at your station?", "options": {"A": "Use three-wire cords and plugs for all AC powered equipment", "B": "Connect all AC powered station equipment to a common safety ground", "C": "Ensure all capacitors used for high-voltage DC are fully discharged before working inside equipment", "D": "All these choices are correct"}}, {"code": "T0A07", "answer": "D", "ref": "", "question": "Where should a lightning arrester be installed in a coaxial feed line?", "options": {"A": "At the output connector of a transceiver", "B": "At the antenna feed point", "C": "At the AC power service panel", "D": "On a grounded panel near where feed lines enter the building"}}, {"code": "T0A08", "answer": "A", "ref": "", "question": "Where should a fuse or circuit breaker be installed in a 120V AC power circuit?", "options": {"A": "In series with the hot conductor only", "B": "In series with the hot and neutral conductors", "C": "In parallel with the hot conductor only", "D": "In parallel with the hot and neutral conductors"}}, {"code": "T0A09", "answer": "C", "ref": "", "question": "What should be done to all external ground rods or earth connections?", "options": {"A": "Waterproof them with silicone caulk or electrical tape", "B": "Keep them as far apart as possible", "C": "Bond them together with heavy wire or conductive strap", "D": "Tune them for resonance on the lowest frequency of operation"}}, {"code": "T0A10", "answer": "A", "ref": "", "question": "What hazard occurs when rapidly charging or discharging an unprotected battery?", "options": {"A": "Overheating or out-gassing", "B": "Excess output ripple", "C": "Electric shock", "D": "Overvoltage"}}, {"code": "T0A11", "answer": "D", "ref": "", "question": "What hazard exists in a power supply immediately after turning it off?", "options": {"A": "Circulating currents in the dc filter", "B": "Leakage flux in the power transformer", "C": "Voltage transients from kickback diodes", "D": "Charge stored in filter capacitors"}}, {"code": "T0A12", "answer": "B", "ref": "", "question": "Which of the following precautions should be taken when measuring high voltages with a voltmeter?", "options": {"A": "Ensure that the voltmeter has very low impedance", "B": "Ensure that the voltmeter and its leads are rated for use at the voltages being measured", "C": "Ensure that the circuit is grounded through the voltmeter", "D": "Ensure that the voltmeter is set to the correct frequency T0B Antenna safety: tower safety and grounding, installing antennas, antenna supports"}}, {"code": "T0B01", "answer": "C", "ref": "", "question": "Which of the following is good practice when installing ground wires on a tower for lightning protection?", "options": {"A": "Put a drip loop in the ground connection to prevent water damage to the ground system", "B": "Make sure all ground wire bends are right angles", "C": "Ensure that connections are short and direct", "D": "All these choices are correct"}}, {"code": "T0B02", "answer": "D", "ref": "", "question": "What is required when climbing an antenna tower?", "options": {"A": "Have sufficient training on safe tower climbing techniques", "B": "Use appropriate tie-off to the tower at all times", "C": "Always wear an approved climbing harness", "D": "All these choices are correct"}}, {"code": "T0B03", "answer": "D", "ref": "", "question": "Under what circumstances is it safe to climb a tower without a helper or observer?", "options": {"A": "When no electrical work is being performed", "B": "When no mechanical work is being performed", "C": "When the work being done is not more than 20 feet above the ground", "D": "Never"}}, {"code": "T0B04", "answer": "C", "ref": "", "question": "Which of the following is an important safety precaution to observe when putting up an antenna tower?", "options": {"A": "Wear a ground strap connected to your wrist at all times", "B": "Insulate the <script>
(function () {
  const Q = POOL_DATA.questions;
  const SUBELS = POOL_DATA.subelements; // [code, title, examQ]
  const GROUPS = POOL_DATA.groups;
  const FIGS = POOL_DATA.figs;
  const byCode = {};
  Q.forEach(q => byCode[q.code] = q);
  const groupOf = code => code.slice(0, 3);
  const subOf = code => code.slice(0, 2);

  const LS_KEY = "hamTechPool2026Progress";
  function loadState() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { attempts: {}, starred: {} };
  }
  let state = loadState();
  function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  function recordAttempt(code, correct) {
    const a = state.attempts[code] || { seen: 0, correct: 0, last: null };
    a.seen++; if (correct) a.correct++; a.last = correct;
    state.attempts[code] = a;
    save();
  }
  function toggleStar(code) {
    if (state.starred[code]) delete state.starred[code]; else state.starred[code] = true;
    save();
  }
  function missedCodes() {
    return Object.keys(state.attempts).filter(c => state.attempts[c].last === false);
  }

  // ---------- tabs ----------
  const tabs = document.getElementById("tabs");
  tabs.addEventListener("click", e => {
    const btn = e.target.closest("button[data-tab]");
    if (!btn) return;
    document.querySelectorAll("nav.tabs button").forEach(b => b.classList.toggle("active", b === btn));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
    if (btn.dataset.tab === "missed") renderMissed();
    if (btn.dataset.tab === "stats") renderStats();
    if (btn.dataset.tab === "flash") refreshFlashScope();
  });

  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function optRow(letter, text, correct, revealed) {
    return `<div class="opt${revealed && correct ? " correct" : ""}"><span class="letter">${letter}</span><span>${esc(text)}</span></div>`;
  }

  function questionCard(q) {
    const starred = !!state.starred[q.code];
    let html = `<div class="qcard" data-code="${q.code}">
      <div class="qhead">
        <span class="qcode">${q.code}</span>
        <button class="star-btn ${starred ? "on" : ""}" data-star="${q.code}" title="Mark for review">${starred ? "★" : "☆"}</button>
      </div>
      <div class="qtext">${esc(q.question)}</div>`;
    if (q.fig) html += `<img class="fig" src="data:image/png;base64,${FIGS[q.fig]}" alt="Figure ${q.fig}">`;
    html += `<div class="opts" data-revealed="0">`;
    ["A","B","C","D"].forEach(l => html += optRow(l, q.options[l], l === q.answer, false));
    html += `</div><button class="reveal-btn" data-reveal="${q.code}">Show answer</button>`;
    if (q.ref) html += `<div class="ref">47 CFR &sect;${q.ref}</div>`;
    html += `</div>`;
    return html;
  }

  // ---------- LEARN ----------
  function renderLearn() {
    const el = document.getElementById("learnList");
    el.innerHTML = SUBELS.map(([code, title, examQ]) => {
      const groupCodes = Object.keys(GROUPS).filter(g => g.startsWith(code));
      const n = Q.filter(q => subOf(q.code) === code).length;
      return `<div class="subel" data-sub="${code}">
        <div class="subel-head" data-toggle="${code}">
          <span class="code">${code}</span>
          <span class="title">${title}</span>
          <span class="count">${examQ} on exam &middot; ${n} in pool</span>
          <span class="chev">&#9656;</span>
        </div>
        <div class="subel-body">
          ${groupCodes.map(g => `
            <div class="group">
              <div class="group-title"><b>${g}</b> &mdash; ${GROUPS[g]}</div>
              ${Q.filter(q => groupOf(q.code) === g).map(questionCard).join("")}
            </div>`).join("")}
        </div>
      </div>`;
    }).join("");
  }

  document.getElementById("learnList").addEventListener("click", e => {
    const head = e.target.closest("[data-toggle]");
    if (head) {
      head.closest(".subel").classList.toggle("open");
      return;
    }
    const revealBtn = e.target.closest("[data-reveal]");
    if (revealBtn) {
      const card = revealBtn.closest(".qcard");
      const q = byCode[card.dataset.code];
      card.querySelector(".opts").innerHTML = ["A","B","C","D"].map(l => optRow(l, q.options[l], l === q.answer, true)).join("");
      revealBtn.remove();
      return;
    }
    const starBtn = e.target.closest("[data-star]");
    if (starBtn) {
      toggleStar(starBtn.dataset.star);
      starBtn.classList.toggle("on");
      starBtn.textContent = starBtn.classList.contains("on") ? "★" : "☆";
    }
  });

  // ---------- FLASHCARDS ----------
  let deck = [], deckIdx = 0;
  const flashScopeSel = document.getElementById("flashScope");
  function buildScopeOptions() {
    let opts = `<option value="all">All 409 questions</option>`;
    SUBELS.forEach(([code, title]) => opts += `<option value="${code}">${code} &mdash; ${title}</option>`);
    opts += `<option value="starred">★ Starred only</option>`;
    opts += `<option value="missed">Missed in quizzes</option>`;
    flashScopeSel.innerHTML = opts;
  }
  buildScopeOptions();

  function scopeQuestions(scope) {
    if (scope === "all") return Q.slice();
    if (scope === "starred") return Q.filter(q => state.starred[q.code]);
    if (scope === "missed") { const m = new Set(missedCodes()); return Q.filter(q => m.has(q.code)); }
    return Q.filter(q => subOf(q.code) === scope);
  }
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
    return arr;
  }
  function refreshFlashScope() {
    deck = scopeQuestions(flashScopeSel.value);
    deckIdx = 0;
    renderFlashDeckInfo();
    renderFlashcard();
  }
  function renderFlashDeckInfo() {
    document.getElementById("flashDeckInfo").textContent = deck.length + " card" + (deck.length === 1 ? "" : "s") + " in this deck";
  }
  function renderFlashcard() {
    const card = document.getElementById("flashcard");
    card.classList.remove("flipped");
    if (!deck.length) {
      document.getElementById("fcCode").textContent = "";
      document.getElementById("fcQ").textContent = "No cards in this deck yet.";
      document.getElementById("fcAnswer").innerHTML = "";
      document.getElementById("fcCounter").textContent = "0 / 0";
      return;
    }
    const q = deck[deckIdx];
    document.getElementById("fcCode").textContent = q.code;
    document.getElementById("fcQ").textContent = q.question;
    let ansHtml = `<div><span class="letter-big">${q.answer}.</span> ${esc(q.options[q.answer])}</div>`;
    if (q.fig) ansHtml += `<img class="fig" src="data:image/png;base64,${FIGS[q.fig]}" alt="Figure ${q.fig}">`;
    document.getElementById("fcAnswer").innerHTML = ansHtml;
    document.getElementById("fcCounter").textContent = (deckIdx + 1) + " / " + deck.length;
  }
  document.getElementById("flashcard").addEventListener("click", () => document.getElementById("flashcard").classList.toggle("flipped"));
  document.getElementById("fcPrev").addEventListener("click", () => { if (deck.length) { deckIdx = (deckIdx - 1 + deck.length) % deck.length; renderFlashcard(); } });
  document.getElementById("fcNext").addEventListener("click", () => { if (deck.length) { deckIdx = (deckIdx + 1) % deck.length; renderFlashcard(); } });
  document.getElementById("flashShuffle").addEventListener("click", () => { shuffle(deck); deckIdx = 0; renderFlashcard(); });
  flashScopeSel.addEventListener("change", refreshFlashScope);
  document.addEventListener("keydown", e => {
    if (!document.getElementById("panel-flash").classList.contains("active")) return;
    if (e.key === " ") { e.preventDefault(); document.getElementById("flashcard").classList.toggle("flipped"); }
    if (e.key === "ArrowRight") document.getElementById("fcNext").click();
    if (e.key === "ArrowLeft") document.getElementById("fcPrev").click();
  });

  // ---------- QUIZ ----------
  let quizQs = [], quizIdx = 0, quizAnswers = [], quizChosen = null;
  function renderQuizSetup() {
    const el = document.getElementById("quizArea");
    let opts = `<option value="exam">Exam simulation &mdash; 35Q, one per group</option><option value="all">All 409 questions</option>`;
    SUBELS.forEach(([code, title]) => opts += `<option value="${code}">${code} &mdash; ${title}</option>`);
    opts += `<option value="starred">★ Starred only</option><option value="missed">Previously missed</option>`;
    el.innerHTML = `
      <div class="quiz-setup">
        <h2>Start a quiz</h2>
        <div class="desc">Exam simulation mirrors the real test format: 35 questions, one randomly drawn from each of the 35 question groups.</div>
        <div class="filter-row">
          <select id="quizScope">${opts}</select>
          <select id="quizLen">
            <option value="10">10 questions</option>
            <option value="25">25 questions</option>
            <option value="35">35 questions</option>
            <option value="all">All available</option>
          </select>
          <button class="btn primary" id="quizStart">Start quiz</button>
        </div>
      </div>`;
    document.getElementById("quizStart").addEventListener("click", startQuiz);
  }

  function startQuiz() {
    const scope = document.getElementById("quizScope").value;
    const lenSel = document.getElementById("quizLen").value;
    let pool;
    if (scope === "exam") {
      const groupCodes = Object.keys(GROUPS);
      pool = groupCodes.map(g => { const gq = Q.filter(q => groupOf(q.code) === g); return gq[Math.floor(Math.random() * gq.length)]; });
      shuffle(pool);
    } else {
      pool = shuffle(scopeQuestions(scope));
      const n = lenSel === "all" ? pool.length : Math.min(parseInt(lenSel, 10), pool.length);
      pool = pool.slice(0, n);
    }
    if (!pool.length) { alert("No questions available for that selection yet — try Learn or Flashcards first, or pick a different scope."); return; }
    quizQs = pool; quizIdx = 0; quizAnswers = new Array(pool.length).fill(null);
    renderQuizQuestion();
  }

  function renderQuizProgress() {
    return `<div class="quiz-progress">${quizQs.map((q, i) => {
      let cls = "tick";
      if (i === quizIdx) cls += " current";
      else if (quizAnswers[i] !== null) cls += " done " + (quizAnswers[i] ? "correct" : "wrong");
      return `<div class="${cls}"></div>`;
    }).join("")}</div>`;
  }

  function renderQuizQuestion() {
    const q = quizQs[quizIdx];
    quizChosen = quizAnswers[quizIdx];
    const el = document.getElementById("quizArea");
    let figHtml = q.fig ? `<img class="fig" src="data:image/png;base64,${FIGS[q.fig]}" alt="Figure ${q.fig}">` : "";
    el.innerHTML = `
      ${renderQuizProgress()}
      <div class="quiz-card">
        <div class="qcode">${q.code} &middot; question ${quizIdx + 1} of ${quizQs.length}</div>
        <div class="qtext">${esc(q.question)}</div>
        ${figHtml}
        <div id="quizOpts">${["A","B","C","D"].map(l => `<div class="quiz-opt" data-letter="${l}"><span class="letter">${l}</span><span>${esc(q.options[l])}</span></div>`).join("")}</div>
        <div class="quiz-foot">
          <span class="quiz-fb" id="quizFb"></span>
          <div class="filter-row" style="margin:0;">
            <button class="btn" id="quizPrev" ${quizIdx === 0 ? "disabled" : ""}>&larr; Back</button>
            <button class="btn primary" id="quizNext" ${quizChosen === null ? "disabled" : ""}>${quizIdx === quizQs.length - 1 ? "Finish" : "Next →"}</button>
          </div>
        </div>
      </div>`;
    if (quizChosen !== null) showQuizAnswered(q);
    document.querySelectorAll(".quiz-opt").forEach(opt => opt.addEventListener("click", () => chooseQuizOpt(opt.dataset.letter)));
    document.getElementById("quizNext").addEventListener("click", () => {
      if (quizIdx === quizQs.length - 1) finishQuiz(); else { quizIdx++; renderQuizQuestion(); }
    });
    document.getElementById("quizPrev").addEventListener("click", () => { if (quizIdx > 0) { quizIdx--; renderQuizQuestion(); } });
  }

  function chooseQuizOpt(letter) {
    if (quizChosen !== null) return;
    const q = quizQs[quizIdx];
    const correct = letter === q.answer;
    quizChosen = correct;
    quizAnswers[quizIdx] = correct;
    recordAttempt(q.code, correct);
    showQuizAnswered(q, letter);
    document.getElementById("quizNext").disabled = false;
    document.querySelectorAll(".quiz-progress .tick")[quizIdx].className = "tick current done " + (correct ? "correct" : "wrong");
  }

  function showQuizAnswered(q, chosenLetter) {
    document.querySelectorAll(".quiz-opt").forEach(opt => {
      opt.classList.add("disabled");
      if (opt.dataset.letter === q.answer) opt.classList.add("chosen-correct");
      else if (opt.dataset.letter === chosenLetter) opt.classList.add("chosen-wrong");
    });
    const fb = document.getElementById("quizFb");
    if (fb) {
      const wasCorrect = quizAnswers[quizIdx];
      fb.textContent = wasCorrect ? "Correct" : "Incorrect — correct answer is " + q.answer;
      fb.className = "quiz-fb " + (wasCorrect ? "correct" : "wrong");
    }
  }

  function finishQuiz() {
    const total = quizQs.length;
    const correct = quizAnswers.filter(Boolean).length;
    const pct = Math.round((correct / total) * 100);
    const passLine = quizQs.length >= 30 ? (pct >= 74 ? "Passing score on a 35Q set is 26/35 (74%) — you'd pass." : "Passing score on a 35Q set is 26/35 (74%) — not quite yet.") : "";
    const missed = quizQs.filter((q, i) => !quizAnswers[i]);
    const el = document.getElementById("quizArea");
    el.innerHTML = `
      <div class="result-card">
        <div class="score">${correct}/${total}</div>
        <div class="verdict">${pct}% correct${passLine ? " &middot; " + passLine : ""}</div>
        <button class="btn primary" id="quizRestart">New quiz</button>
        ${missed.length ? `<div class="miss-list">${missed.map(questionCard).join("")}</div>` : ""}
      </div>`;
    document.getElementById("quizRestart").addEventListener("click", renderQuizSetup);
    el.querySelectorAll("[data-reveal]").forEach(btn => btn.addEventListener("click", e => {
      const card = e.target.closest(".qcard");
      const q = byCode[card.dataset.code];
      card.querySelector(".opts").innerHTML = ["A","B","C","D"].map(l => optRow(l, q.options[l], l === q.answer, true)).join("");
      e.target.remove();
    }));
    el.querySelectorAll("[data-star]").forEach(btn => btn.addEventListener("click", e => {
      toggleStar(e.target.dataset.star);
      e.target.classList.toggle("on");
      e.target.textContent = e.target.classList.contains("on") ? "★" : "☆";
    }));
  }

  // ---------- MISSED ----------
  function renderMissed() {
    const el = document.getElementById("missedArea");
    const codes = missedCodes();
    if (!codes.length) { el.innerHTML = `<div class="empty">No missed questions yet. They'll collect here after you take a quiz.</div>`; return; }
    el.innerHTML = `<div class="filter-row"><button class="btn" id="clearMissed">Clear missed list</button></div>` +
      codes.map(c => questionCard(byCode[c])).join("");
    document.getElementById("clearMissed").addEventListener("click", () => {
      codes.forEach(c => { if (state.attempts[c]) state.attempts[c].last = null; });
      save(); renderMissed();
    });
    el.querySelectorAll("[data-reveal]").forEach(btn => btn.addEventListener("click", e => {
      const card = e.target.closest(".qcard");
      const q = byCode[card.dataset.code];
      card.querySelector(".opts").innerHTML = ["A","B","C","D"].map(l => optRow(l, q.options[l], l === q.answer, true)).join("");
      e.target.remove();
    }));
    el.querySelectorAll("[data-star]").forEach(btn => btn.addEventListener("click", e => {
      toggleStar(e.target.dataset.star);
      e.target.classList.toggle("on");
      e.target.textContent = e.target.classList.contains("on") ? "★" : "☆";
    }));
  }

  // ---------- STATS ----------
  function renderStats() {
    const el = document.getElementById("statsArea");
    const totalSeen = Object.keys(state.attempts).length;
    const totalCorrectLast = Object.values(state.attempts).filter(a => a.last).length;
    const overallPct = totalSeen ? Math.round((totalCorrectLast / totalSeen) * 100) : 0;
    let html = `<div class="stat-grid">
      <div class="stat-card"><div class="n">${totalSeen}</div><div class="l">questions attempted</div></div>
      <div class="stat-card"><div class="n">${overallPct}%</div><div class="l">currently correct</div></div>
      <div class="stat-card"><div class="n">${Object.keys(state.starred).length}</div><div class="l">starred for review</div></div>
    </div>`;
    html += SUBELS.map(([code, title]) => {
      const codes = Q.filter(q => subOf(q.code) === code).map(q => q.code);
      const attempted = codes.filter(c => state.attempts[c]);
      const correct = attempted.filter(c => state.attempts[c].last).length;
      const pct = attempted.length ? Math.round((correct / attempted.length) * 100) : 0;
      return `<div style="margin-bottom:12px;">
        <div class="meter-row" style="margin-bottom:4px;">
          <span style="font-family:var(--mono);font-size:12px;color:var(--accent);min-width:26px;">${code}</span>
          <span style="font-size:13px;flex:1;">${title}</span>
          <span class="meter-label">${attempted.length}/${codes.length} seen</span>
        </div>
        <div class="meter-row">
          <div class="meter-track"><div class="meter-fill" style="width:${pct}%"></div></div>
          <span class="meter-label">${attempted.length ? pct + "%" : "—"}</span>
        </div>
      </div>`;
    }).join("");
    el.innerHTML = html;
  }

  renderLearn();
  refreshFlashScope();
  renderQuizSetup();
})();
</script>
